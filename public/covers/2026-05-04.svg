  <line x1="750" y1="400" x2="700" y2="320" stroke="#ff6b8a" stroke-width="6" stroke-linecap="round"/>
  <line x1="650" y1="400" x2="750" y2="400" stroke="#ff6b8a" stroke-width="6" stroke-linecap="round"/>

