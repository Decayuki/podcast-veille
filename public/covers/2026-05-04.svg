  <path d="M600 930 L550 980 L600 1030" fill="none" stroke="#6bfbff" stroke-width="12" stroke-linecap="round"/>
  <path d="M800 930 L850 980 L800 1030" fill="none" stroke="#6bfbff" stroke-width="12" stroke-linecap="round"/>

