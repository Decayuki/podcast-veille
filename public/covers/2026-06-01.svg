  <!-- Icône 2: Rectangle abstrait (pour le code/processus) - Couleur vive -->
  <rect x="950" y="200" width="200" height="100" rx="20" ry="20" fill="#9370db"/>

  <!-- Titre de l'épisode (centré, en plusieurs lignes si nécessaire) -->
