<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif">
  <!-- Fond sombre -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <!-- Titre de l'épisode -->
  <text x="700" y="500" text-anchor="middle" fill="#f0f0f0" font-size="90" font-weight="bold">
    <tspan x="700" dy="0">Quand l'IA vous menace</tspan>
    <tspan x="700" dy="110">et que Claude se rebelle</tspan>
  </text>

  <!-- Icône 1: Stylisation d'une puce ou d'un réseau neuronal (représentant l'IA) -->
  <g transform="translate(570, 750) scale(1.5)">
    <!-- Carré extérieur -->
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linejoin="round"/>
    <!-- Lignes internes pour un effet grille/circuit -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#00e5ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#00e5ff" stroke-width="4" stroke-linecap="round"/>
    <!-- Petits cercles pour les "nodes" -->
    <circle cx="-25" cy="-25" r="8" fill="#00e5ff"/>
    <circle cx="25" cy="-25" r="8" fill="#00e5ff"/>
    <circle cx="-25" cy="25" r="8" fill="#00e5ff"/>
    <circle cx="25" cy="25" r="8" fill="#00e5ff"/>
  </g>

  <!-- Icône 2: Symbole d'avertissement (représentant la menace/rébellion) -->
  <g transform="translate(800, 750) scale(1.5)">
    <!-- Triangle d'avertissement -->
    <polygon points="-50,-50 50,-50 0,50" fill="#ffab00"/>
    <!-- Point d'exclamation (utilisant la couleur du fond pour le contraste) -->
    <rect x="-10" y="-20" width="20" height="30" fill="#1a1a2e"/>
    <circle cx="0" cy="30" r="10" fill="#1a1a2e"/>
  </g>

  <!-- Nom du podcast et date -->
  <text x="700" y="1280" text-anchor="middle" fill="#aaaaaa" font-size="40">
    <tspan x="700" dy="0">Veille de Marc</tspan>
    <tspan x="700" dy="50">2026-03-26</tspan>
  </text>
</svg>