<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre principal -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <!-- Formes géométriques abstraites (icônes/patterns tech) -->
  <!-- Ces formes sont placées derrière le texte, avec une opacité réduite pour un effet subtil et moderne. -->
  <g opacity="0.3" transform="translate(0, -50)">
    <!-- Carré large, légèrement pivoté, en haut à gauche -->
    <rect x="200" y="200" width="300" height="300" fill="#00FFFF" transform="rotate(15 350 350)"/>
    <!-- Cercle large, en haut à droite -->
    <circle cx="1100" cy="350" r="200" fill="#FF00FF"/>
    <!-- Rectangle large, légèrement pivoté, en bas à droite -->
    <rect x="800" y="950" width="400" height="200" fill="#FFFF00" transform="rotate(-10 1000 1050)"/>
    <!-- Petit carré, légèrement pivoté, en bas à gauche -->
    <rect x="150" y="850" width="200" height="200" fill="#00FFFF" transform="rotate(30 250 950)"/>
    <!-- Petit cercle, en bas au centre gauche -->
    <circle cx="300" cy="1200" r="100" fill="#FF00FF"/>
    <!-- Petit rectangle, légèrement pivoté, en haut au centre droit -->
    <rect x="1000" y="150" width="100" height="50" fill="#FFFF00" transform="rotate(45 1050 175)"/>
  </g>

  <!-- Titre de l'épisode (centré et lisible) -->
  <!-- Le titre est divisé en plusieurs lignes pour une meilleure lisibilité et composition. -->
  <text x="700" y="450" font-family="sans-serif" font-weight="bold" font-size="75" fill="#E0E0E0" text-anchor="middle">IA et Dev :</text>
  <text x="700" y="540" font-family="sans-serif" font-weight="bold" font-size="75" fill="#E0E0E0" text-anchor="middle">Crise chez OpenAI,</text>
  <text x="700" y="630" font-family="sans-serif" font-weight="bold" font-size="75" fill="#E0E0E0" text-anchor="middle">Mac Mini en Force,</text>
  <text x="700" y="720" font-family="sans-serif" font-weight="bold" font-size="75" fill="#E0E0E0" text-anchor="middle">et Patterns Réinventés</text>

  <!-- Nom du podcast (en bas, petit) -->
  <text x="700" y="1100" font-family="sans-serif" font-size="40" fill="#A0A0A0" text-anchor="middle">Veille de Marc</text>

  <!-- Date de l'épisode (en bas, petit) -->
  <text x="700" y="1150" font-family="sans-serif" font-size="30" fill="#A0A0A0" text-anchor="middle">2026-03-27</text>
</svg>