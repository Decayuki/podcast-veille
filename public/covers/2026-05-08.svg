<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <!-- Styles pour le texte -->
  <style>
    .title-text {
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 90px;
      fill: #f0f8ff; /* Blanc cassé lumineux */
      text-anchor: middle;
    }
    .footer-text {
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 400;
      font-size: 36px;
      fill: #a0a0b0; /* Gris sourd pour le pied de page */
      text-anchor: middle;
    }
  </style>

  <!-- Titre de l'épisode (centré et décomposé sur plusieurs lignes) -->
  <text x="700" y="500" class="title-text">Le Royaume du Code :</text>
  <text x="700" y="600" class="title-text">Claude, Codex et l'Ère</text>
  <text x="700" y="700" class="title-text">des Agents IA</text>

  <!-- Icône 1 : Un signe "supérieur à" (>) stylisé, évoquant le code, les commandes ou l'avancée -->
  <polygon points="350,550 500,600 350,650" fill="#00f5d4"/> <!-- Cyan vibrant -->

  <!-- Icône 2 : Un carré aux coins arrondis, représentant un bloc, un agent ou un composant -->
  <rect x="950" y="650" width="150" height="150" rx="20" ry="20" fill="#ff0080"/> <!-- Magenta vibrant -->

  <!-- Nom du podcast (en bas, centré) -->
  <text x="700" y="1200" class="footer-text">Veille de Marc</text>

  <!-- Date de l'épisode (en bas, centré) -->
  <text x="700" y="1250" class="footer-text">2026-05-08</text>
</svg>