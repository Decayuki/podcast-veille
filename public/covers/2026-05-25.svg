<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond sombre -->
    <rect x="0" y="0" width="1400" height="1400" fill="#1a1a2e"/>

    <!-- Icône / Forme géométrique abstraite pour l'IA et les données (un "chip" central avec des "tokens" connectés) -->
    <!-- Boîtier du "chip" central -->
    <rect x="600" y="240" width="200" height="200" rx="30" ry="30" fill="#ff4081" opacity="0.8"/>
    <!-- Cœur du "chip" -->
    <circle cx="700" cy="340" r="50" fill="#00bcd4"/>

    <!-- Tokens / Points de données environnants -->
    <circle cx="500" cy="250" r="20" fill="#ffeb3b" opacity="0.6"/>
    <circle cx="900" cy="250" r="20" fill="#ffeb3b" opacity="0.6"/>
    <circle cx="500" cy="430" r="20" fill="#ffeb3b" opacity="0.6"/>
    <circle cx="900" cy="430" r="20" fill="#ffeb3b" opacity="0.6"/>

    <!-- Lignes de connexion (flux de données / réseau) -->
    <line x1="700" y1="340" x2="500" y2="250" stroke="#ff4081" stroke-width="8" opacity="0.5"/>
    <line x1="700" y1="340" x2="900" y2="250" stroke="#ff4081" stroke-width="8" opacity="0.5"/>
    <line x1="700" y1="340" x2="500" y2="430" stroke="#ff4081" stroke-width="8" opacity="0.5"/>
    <line x1="700" y1="340" x2="900" y2="430" stroke="#ff4081" stroke-width="8" opacity="0.5"/>

    <!-- Titre de l'épisode -->
    <text x="700" y="650" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="95" font-weight="bold" fill="#ffeb3b">
        <tspan x="700" dy="0">AI Démystifiée :</tspan>
        <tspan x="700" dy="115">Tokens, Hallucinations</tspan>
        <tspan x="700" dy="115">et Agents du Futur</tspan>
    </text>

    <!-- Nom du podcast -->
    <text x="700" y="1250" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="45" fill="#00bcd4" opacity="0.8">
        Veille de Marc
    </text>

    <!-- Date de l'épisode -->
    <text x="700" y="1310" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="35" fill="#00bcd4" opacity="0.6">
        2026-05-25
    </text>
</svg>