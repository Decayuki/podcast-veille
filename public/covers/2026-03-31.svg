<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre -->
  <rect x="0" y="0" width="1400" height="1400" fill="#1a1a2e"/>

  <!-- Formes géométriques abstraites inspirées par la tech et les données -->
  <!-- Grand carré rotatif semi-transparent (suggérant grille de données ou processeur) -->
  <rect x="150" y="150" width="1100" height="1100" fill="#00f0ff" opacity="0.12" transform="rotate(45 700 700)"/>

  <!-- Petit triangle en haut à droite (dynamisme, innovation) -->
  <polygon points="1050,250 1250,450 850,450" fill="#ff66ff"/>

  <!-- Petit cercle en bas à gauche (point de données, connexion) -->
  <circle cx="350" cy="1150" r="90" fill="#aaff00"/>
  
  <!-- Titre de l'épisode (centré et lisible) -->
  <text x="700" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="90" fill="white" font-weight="bold">IA : Bulle ou Révolution ?</text>
  <text x="700" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="70" fill="#aaff00">Les coulisses tech de la semaine.</text>

  <!-- Nom du podcast et date (en petit, en bas) -->
  <text x="700" y="1320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#888888">Veille de Marc</text>
  <text x="700" y="1365" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#888888">2026-03-31</text>
</svg>