<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre -->
  <rect x="0" y="0" width="1400" height="1400" fill="#1a1a2e"/>

  <!-- Titre de l'épisode -->
  <text x="700" y="550" font-family="Inter, system-ui, sans-serif" font-weight="bold" font-size="90" fill="#f0f0f0" text-anchor="middle">
    <tspan x="700" dy="0">La facture des</tspan>
    <tspan x="700" dy="110">agents IA explose :</tspan>
    <tspan x="700" dy="110">comment reprendre</tspan>
    <tspan x="700" dy="110">le contrôle ?</tspan>
  </text>

  <!-- Icône 1: Hexagone stylisé pour l'IA/Tech (Cyan) -->
  <!-- Centré à (350, 350) avec un rayon de 120px, légèrement incliné -->
  <g transform="translate(350, 350) rotate(-15)">
    <polygon points="120,0 60,103.9 -60,103.9 -120,0 -60,-103.9 60,-103.9" fill="#00f0ff" />
    <circle cx="0" cy="0" r="30" fill="#1a1a2e"/> <!-- Cercle intérieur pour le détail -->
  </g>

  <!-- Icône 2: Flèche montante pour l'explosion des coûts (Magenta) -->
  <!-- Base de la flèche à (1050, 1000), pointant vers le haut, légèrement inclinée -->
  <g transform="translate(1050, 1000) rotate(15)">
    <!-- Corps de la flèche -->
    <rect x="-30" y="-150" width="60" height="150" fill="#ff007f" rx="10" ry="10"/>
    <!-- Pointe de la flèche (triangle) -->
    <polygon points="-80,-150 80,-150 0,-250" fill="#ff007f"/>
  </g>

  <!-- Nom du podcast -->
  <text x="100" y="1300" font-family="Inter, system-ui, sans-serif" font-size="40" fill="#cccccc" text-anchor="start">Veille de Marc</text>

  <!-- Date de l'épisode -->
  <text x="1300" y="1300" font-family="Inter, system-ui, sans-serif" font-size="40" fill="#cccccc" text-anchor="end">2026-05-28</text>
</svg>